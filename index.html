<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self' https://script.google.com https://script.googleusercontent.com; form-action 'none'; base-uri 'self'; object-src 'none';">
<title>Emma & Alex — 6th November 2027</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  nav, footer, header { display: none !important; }
  body { background: linear-gradient(160deg, #7a2010 0%, #c4600a 45%, #b8860b 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; margin: 0; }

  .bc-hero-img { width: min(300px, 72vw); height: auto; margin-bottom: 0.5rem; opacity: 0.75; }
  .bc-credit { font-family: Arial, sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(255,243,230,0.45); margin-bottom: 2rem; }
  .bc-credit a { color: rgba(255,243,230,0.55); text-decoration: none; }
  .bc-credit a:hover { color: rgba(255,243,230,0.75); }
  .bc-eyebrow { font-family: Arial, sans-serif; font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,243,230,0.85); margin-bottom: 1.5rem; }
  .bc-date { font-family: Arial, sans-serif; font-size: 1rem; letter-spacing: 0.2em; color: rgba(255,243,230,0.9); margin: 1.2rem 0 0.4rem; text-transform: uppercase; }
  .bc-venue { font-size: 1.1rem; color: rgba(255,243,230,0.75); font-style: italic; margin-bottom: 2.5rem; }

  .countdown { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: nowrap; }
  .countdown-item { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; width: 72px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .countdown-num { display: block; font-size: 1.6rem; color: #fff; font-weight: 300; line-height: 1; }
  .countdown-label { font-family: Arial, sans-serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,243,230,0.65); margin-top: 0.3rem; display: block; }

  .hero-leaf { position: absolute; top: 0; pointer-events: none; user-select: none; z-index: 1; opacity: 0; will-change: transform, opacity; }
  @keyframes leafDrift {
    0% { transform: translateY(-40px) translateX(0) rotate(0deg); opacity: 0; }
    8% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(calc(100vh + 40px)) translateX(var(--drift-x)) rotate(var(--spin)); opacity: 0; }
  }

  @media (max-width: 700px) {
    .countdown-item { width: 60px; }
    .countdown-num { font-size: 1.3rem; }
    .countdown-label { font-size: 0.55rem; }
  }
</style>
</head>
<body>
  <p class="bc-eyebrow">You are warmly invited to celebrate the marriage of</p>
  <img class="bc-hero-img" src="images/Em Alex Save Date_png.png" alt="Emma and Alex autumn illustration by Alice Krieits">
  <p class="bc-credit">Illustration by <a href="https://www.instagram.com/alice_krieits/" target="_blank">@alice_krieits</a></p>
  <p class="bc-date">6th November 2027</p>
  <p class="bc-venue">Gaynes Park, Epping</p>
  <div class="countdown">
    <div class="countdown-item"><span class="countdown-num" id="cd-days">–</span><span class="countdown-label">Days</span></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-hours">–</span><span class="countdown-label">Hours</span></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-mins">–</span><span class="countdown-label">Minutes</span></div>
    <div class="countdown-item"><span class="countdown-num" id="cd-secs">–</span><span class="countdown-label">Seconds</span></div>
  </div>

<script src="js/shared.js"></script>
<script>
  (function() {
    function updateCountdown() {
      var target = new Date('2027-11-06T14:00:00');
      var now = new Date();
      var diff = target - now;
      var days = document.getElementById('cd-days');
      var hours = document.getElementById('cd-hours');
      var mins = document.getElementById('cd-mins');
      var secs = document.getElementById('cd-secs');
      if (diff <= 0) {
        days.textContent = '0';
        hours.textContent = '0';
        mins.textContent = '0';
        secs.textContent = '0';
        return;
      }
      days.textContent = Math.floor(diff / 86400000);
      hours.textContent = Math.floor((diff % 86400000) / 3600000);
      mins.textContent = Math.floor((diff % 3600000) / 60000);
      secs.textContent = Math.floor((diff % 60000) / 1000);
    }

    function setupFloatingLeaves() {
      var leafSrcs = ['images/Leaf 1.png', 'images/Leaf 2.png', 'images/Leaf 3.png'];
      for (var i = 0; i < 5; i++) {
        var el = document.createElement('img');
        el.className = 'hero-leaf';
        el.src = leafSrcs[Math.floor(Math.random() * leafSrcs.length)];
        el.alt = '';
        el.style.left = (8 + Math.random() * 84) + '%';
        var size = 16 + Math.random() * 14;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.setProperty('--drift-x', (Math.random() > 0.5 ? '' : '-') + (20 + Math.random() * 50) + 'px');
        el.style.setProperty('--spin', (Math.random() > 0.5 ? '' : '-') + (120 + Math.random() * 240) + 'deg');
        var dur = 14 + Math.random() * 12;
        el.style.animation = 'leafDrift ' + dur + 's linear ' + (Math.random() * dur) + 's infinite backwards';
        el.style.opacity = '0.75';
        var tints = ['sepia', 'saturate', 'hue-rotate'];
        var pick = tints[Math.floor(Math.random() * tints.length)];
        if (pick === 'sepia') {
          el.style.filter = 'sepia(' + (Math.random() * 0.5) + ')';
        } else if (pick === 'saturate') {
          el.style.filter = 'saturate(' + (1 + Math.random() * 0.5) + ') hue-rotate(' + Math.floor(-30 + Math.random() * 15) + 'deg)';
        } else {
          el.style.filter = 'sepia(' + (Math.random() * 0.3) + ') hue-rotate(' + Math.floor(Math.random() * 30) + 'deg)';
        }
        document.body.appendChild(el);
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    setupFloatingLeaves();
  })();
</script>
</body>
</html>
